name: Build ConsultaHacienda

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1-mesa-dev \
          libglib2.0-0 \
          libxcb-xinerama0 \
          libxkbcommon0 \
          libxkbcommon-x11-0 \
          libxcb-cursor0 \
          libxcb-icccm4 \
          libxcb-keysyms1 \
          libxcb-shape0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: python build.py

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: python build.py
      shell: cmd
      env:
        PYTHONIOENCODING: utf-8

    - name: Get OS name
      id: get-os
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          echo "os_name=linux" >> $GITHUB_OUTPUT
        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          echo "os_name=windows" >> $GITHUB_OUTPUT
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          echo "os_name=macos" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ConsultaHacienda-${{ steps.get-os.outputs.os_name }}
        path: release/
        retention-days: 30

    - name: Upload to GitHub Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        draft: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
